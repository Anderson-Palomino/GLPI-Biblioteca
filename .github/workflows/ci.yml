name: CI - Pruebas Automatizadas GLPI Biblioteca

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  validar-entregables:
    name: Validar entregables del proyecto
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Verificar archivos obligatorios
        run: |
          echo "Verificando entregables..."
          test -f investigacion_pruebas_software.pdf || (echo "FALTA: PDF de investigacion" && exit 1)
          test -f plan_pruebas_biblioteca_GLPI.xlsx || (echo "FALTA: Excel del plan de pruebas" && exit 1)
          test -f tableau_casos.csv || (echo "FALTA: CSV Tableau casos" && exit 1)
          test -f tableau_resultados.csv || (echo "FALTA: CSV Tableau resultados" && exit 1)
          test -f docker-compose.yml || (echo "FALTA: docker-compose.yml" && exit 1)
          test -f scripts/test_automatizado.py || (echo "FALTA: Script de pruebas automatizadas" && exit 1)
          test -f scripts/stress_test.py || (echo "FALTA: Script de stress test" && exit 1)
          test -f scripts/stress_catastrofico.py || (echo "FALTA: Script catastrofico" && exit 1)
          test -d casos-de-prueba/evidencias || (echo "FALTA: Carpeta de evidencias" && exit 1)
          echo "Todos los entregables presentes"

      - name: Listar evidencias
        run: |
          echo "Evidencias del proyecto:"
          ls -la casos-de-prueba/evidencias/ | head -30
          echo ""
          echo "Total de evidencias: $(ls casos-de-prueba/evidencias/ | wc -l)"

  validar-codigo-python:
    name: Validar scripts Python
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests flake8

      - name: Verificar sintaxis Python
        run: |
          python -m py_compile scripts/test_automatizado.py
          python -m py_compile scripts/stress_test.py
          python -m py_compile scripts/stress_catastrofico.py
          echo "Sintaxis Python correcta"

      - name: Linter Python (errores criticos)
        run: |
          flake8 scripts/ --count --select=E9,F63,F7,F82 --show-source --statistics

  pruebas-integracion:
    name: Pruebas de integracion contra GLPI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests

      - name: Levantar GLPI con Docker Compose
        run: |
          docker compose up -d
          echo "Esperando a que GLPI inicie..."
          for i in {1..30}; do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:8080 | grep -q "200\|302"; then
              echo "GLPI respondiendo"
              break
            fi
            echo "Intento $i/30..."
            sleep 5
          done

      - name: Validar conectividad GLPI
        run: |
          curl -v http://localhost:8080/ 2>&1 | head -20
          echo "GLPI accesible en CI"

      - name: Logs de Docker (en caso de fallo)
        if: failure()
        run: |
          docker compose logs glpi | tail -50
          docker compose logs glpi-mysql | tail -50

      - name: Apagar contenedores
        if: always()
        run: docker compose down -v

  reporte-final:
    name: Reporte de estado del proyecto
    runs-on: ubuntu-latest
    needs: [validar-entregables, validar-codigo-python, pruebas-integracion]
    if: always()
    steps:
      - name: Resumen del pipeline
        run: |
          echo "===================================================="
          echo "  PIPELINE CI/CD - GLPI BIBLIOTECA"
          echo "  Equipo: Perez Huarachi | Palomino | Sarmiento"
          echo "  Curso: Pruebas de Software - UTP"
          echo "===================================================="
          echo "Validacion de entregables : ${{ needs.validar-entregables.result }}"
          echo "Validacion de codigo      : ${{ needs.validar-codigo-python.result }}"
          echo "Pruebas de integracion    : ${{ needs.pruebas-integracion.result }}"
          echo "===================================================="
